<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:#f0f4f8;color:#333}
.header{background:linear-gradient(135deg,#f5a623,#e8872a);color:#fff;padding:2rem 1.5rem;text-align:center}
.header h1{font-size:1.8rem;margin-bottom:.3rem}
.header p{opacity:.85;font-size:.95rem}
.nav{display:flex;flex-wrap:wrap;gap:.5rem;padding:1rem 1.5rem;background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.nav button{padding:.5rem 1rem;border:1.5px solid #d0d5dd;border-radius:20px;background:#fff;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.nav button.active{background:#2b6cb0;color:#fff;border-color:#2b6cb0}
.nav button:hover{border-color:#2b6cb0;color:#2b6cb0}
.nav button.active:hover{color:#fff}

.process{display:none;padding:1.5rem;max-width:100%}
.process.active{display:block}
.process>h2{text-align:center;font-size:1.5rem;margin-bottom:.3rem;color:#1a365d}
.process>.subtitle{text-align:center;color:#718096;font-size:.9rem;margin-bottom:1.5rem}

.flowchart-wrap{overflow-x:auto;padding:1rem 0}
.flowchart{position:relative;margin:0 auto}

/* Shapes */
.fc-node{position:absolute;text-align:center;font-size:.78rem;line-height:1.3;font-weight:600;display:flex;align-items:center;justify-content:center;padding:.5rem .6rem;z-index:2;cursor:default;transition:box-shadow .2s}
.fc-node:hover{box-shadow:0 4px 16px rgba(0,0,0,.15)}

/* Start / End */
.fc-start,.fc-end{
    background:linear-gradient(135deg,#2b6cb0,#2c5282);color:#fff;
    border-radius:50px;border:2px solid #1a365d;
    min-width:120px;height:44px;
}
.fc-end{background:linear-gradient(135deg,#38a169,#276749);border-color:#22543d}

/* Process */
.fc-process{
    background:#fff;color:#2d3748;
    border:2px solid #2b6cb0;border-radius:8px;
    min-width:130px;min-height:48px;
    box-shadow:0 2px 6px rgba(43,108,176,.1);
}

/* Decision (diamond via clip-path is hard to read, use rotated square) */
.fc-decision{
    background:#ebf4ff;color:#2b6cb0;
    border:2.5px solid #2b6cb0;
    width:110px;height:110px;
    transform:rotate(45deg);
    border-radius:8px;
    font-weight:700;
}
.fc-decision span{
    transform:rotate(-45deg);
    display:block;
    font-size:.72rem;
    line-height:1.25;
    padding:0 .2rem;
}

/* Data */
.fc-data{
    background:#fefcbf;color:#744210;
    border:2px solid #d69e2e;border-radius:8px;
    min-width:120px;min-height:44px;
    box-shadow:0 2px 6px rgba(214,158,46,.1);
}

/* Sub-process */
.fc-sub{
    background:#e9d8fd;color:#553c9a;
    border:2px solid #805ad5;border-radius:8px;
    min-width:120px;min-height:44px;
}

/* Labels on arrows */
.fc-label{
    position:absolute;font-size:.7rem;font-weight:700;z-index:3;
    padding:.1rem .4rem;border-radius:4px;
}
.fc-label.yes{color:#276749;background:#c6f6d5}
.fc-label.no{color:#9b2c2c;background:#fed7d7}

/* SVG arrows */
.fc-arrows{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
.fc-arrows line,.fc-arrows path{stroke:#2b6cb0;stroke-width:2;fill:none}
.fc-arrows marker path{fill:#2b6cb0}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:1.2rem;padding:.8rem 1.5rem;background:#fff;margin:0 1.5rem 1rem;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);justify-content:center}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.78rem;color:#4a5568}
.legend-shape{width:28px;height:18px;border-radius:4px;border:2px solid}
.legend-diamond{width:16px;height:16px;transform:rotate(45deg);border-radius:3px;border:2px solid #2b6cb0;background:#ebf4ff}

/* Sub section titles */
.sub-title{text-align:center;font-size:1.1rem;font-weight:700;color:#2d3748;margin:2rem 0 .5rem;padding-top:1rem;border-top:2px dashed #e2e8f0}
.sub-title:first-of-type{border-top:none;margin-top:.5rem}

@media(max-width:700px){
    .flowchart-wrap{padding:.5rem 0}
    .fc-node{font-size:.7rem}
}
</style>

// =========================================================
// RENDER ENGINE
// =========================================================
const content = document.getElementById('content');
const nav = document.getElementById('nav');

function getCenter(n){
    if(n.type==='decision') return {x:n.x+n.w/2, y:n.y+n.h/2};
    return {x:n.x+n.w/2, y:n.y+n.h/2};
}
function getBottom(n){const c=getCenter(n); return {x:c.x, y:n.type==='decision'?n.y+n.h:n.y+n.h};}
function getTop(n){const c=getCenter(n); return {x:c.x, y:n.y};}
function getLeft(n){const c=getCenter(n); return {x:n.x, y:c.y};}
function getRight(n){const c=getCenter(n); return {x:n.x+n.w, y:c.y};}

function renderChart(chart){
    const wrap = document.createElement('div');
    wrap.className='flowchart-wrap';
    const fc = document.createElement('div');
    fc.className='flowchart';
    fc.style.width=chart.width+'px';
    fc.style.height=chart.height+'px';
    fc.style.position='relative';

    // SVG for arrows
    const svgNS='http://www.w3.org/2000/svg';
    const svg=document.createElementNS(svgNS,'svg');
    svg.setAttribute('class','fc-arrows');
    svg.setAttribute('width',chart.width);
    svg.setAttribute('height',chart.height);
    // Arrow marker
    const defs=document.createElementNS(svgNS,'defs');
    const marker=document.createElementNS(svgNS,'marker');
    marker.setAttribute('id','arrow-'+chart.title.replace(/\s/g,''));
    marker.setAttribute('viewBox','0 0 10 10');
    marker.setAttribute('refX','10');marker.setAttribute('refY','5');
    marker.setAttribute('markerWidth','8');marker.setAttribute('markerHeight','8');
    marker.setAttribute('orient','auto-start-reverse');
    const mp=document.createElementNS(svgNS,'path');
    mp.setAttribute('d','M 0 0 L 10 5 L 0 10 z');
    mp.setAttribute('fill','#2b6cb0');
    marker.appendChild(mp);defs.appendChild(marker);svg.appendChild(defs);

    const markerUrl='url(#arrow-'+chart.title.replace(/\s/g,'')+')';

    // Render nodes
    const nodeMap={};
    chart.nodes.forEach(n=>{
        nodeMap[n.id]=n;
        const el=document.createElement('div');
        el.className='fc-node fc-'+n.type;
        el.style.left=n.x+'px';
        el.style.top=n.y+'px';
        if(n.type!=='decision'){
            el.style.width=n.w+'px';
            el.style.minHeight=n.h+'px';
            el.textContent=n.text;
        } else {
            el.style.width=n.w+'px';
            el.style.height=n.h+'px';
            const sp=document.createElement('span');
            sp.textContent=n.text;
            el.appendChild(sp);
        }
        fc.appendChild(el);
    });

    // Render arrows
    chart.arrows.forEach(a=>{
        const fromN=nodeMap[a.from], toN=nodeMap[a.to];
        if(!fromN||!toN)return;
        let p1,p2;

        if(a.side==='left'){
            p1=fromN.type==='decision'?getLeft(fromN):getBottom(fromN);
            p2=toN.y<fromN.y?getBottom(toN):
               toN.x+toN.w<fromN.x?getRight(toN):
               getTop(toN).y>p1.y?getTop(toN):getRight(toN);
            if(toN.x+toN.w/2<fromN.x) p2=getRight(toN);
            else p2=getTop(toN);
        } else if(a.side==='right'){
            p1=fromN.type==='decision'?getRight(fromN):getBottom(fromN);
            p2=toN.x>fromN.x+fromN.w?getLeft(toN):getTop(toN);
            if(toN.x>fromN.x+fromN.w) p2=getLeft(toN);
            else p2=getTop(toN);
        } else {
            p1=getBottom(fromN);
            p2=getTop(toN);
            if(Math.abs(p1.x-p2.x)>150 && Math.abs(p1.y-p2.y)<30){
                p1=getRight(fromN);p2=getLeft(toN);
            }
        }

        const path=document.createElementNS(svgNS,'path');
        // Simple elbow connector
        if(Math.abs(p1.x-p2.x)<3){
            path.setAttribute('d',`M${p1.x},${p1.y} L${p2.x},${p2.y}`);
        } else {
            const midY=p1.y+(p2.y-p1.y)/2;
            if(Math.abs(p1.y-p2.y)<10){
                path.setAttribute('d',`M${p1.x},${p1.y} L${p2.x},${p2.y}`);
            } else {
                path.setAttribute('d',`M${p1.x},${p1.y} L${p1.x},${midY} L${p2.x},${midY} L${p2.x},${p2.y}`);
            }
        }
        path.setAttribute('marker-end',markerUrl);
        svg.appendChild(path);

        // Label
        if(a.label){
            const lbl=document.createElement('div');
            lbl.className='fc-label '+(a.label==='Si'||a.label==='❤️'?'yes':'no');
            lbl.textContent=a.label;
            const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
            lbl.style.left=(mx-12)+'px';
            lbl.style.top=(my-10)+'px';
            fc.appendChild(lbl);
        }
    });

    fc.appendChild(svg);
    wrap.appendChild(fc);
    return wrap;
}

processes.forEach((proc,idx)=>{
    // Nav button
    const btn=document.createElement('button');
    btn.textContent=proc.label;
    btn.onclick=()=>{
        document.querySelectorAll('.process').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
        document.getElementById('proc-'+proc.id).classList.add('active');
        btn.classList.add('active');
    };
    nav.appendChild(btn);

    // Process container
    const div=document.createElement('div');
    div.className='process';
    div.id='proc-'+proc.id;

    const h2=document.createElement('h2');h2.textContent=proc.title;div.appendChild(h2);
    const sub=document.createElement('p');sub.className='subtitle';sub.textContent=proc.subtitle;div.appendChild(sub);

    proc.charts.forEach(chart=>{
        const st=document.createElement('div');st.className='sub-title';st.textContent=chart.title;
        div.appendChild(st);
        div.appendChild(renderChart(chart));
    });

    content.appendChild(div);
    if(idx===0) btn.click();
});
</script>
